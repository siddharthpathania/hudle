name: hudle
description: "Hudle — Gather. Plan. Achieve. Collaborative task management."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State & routing
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.6.2

  # Backend
  supabase_flutter: ^2.8.0
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  firebase_messaging: ^15.1.5
  google_sign_in: ^6.2.2
  flutter_local_notifications: ^18.0.1

  # UI & assets
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.2.0

  # Pickers / calendar / charts
  file_picker: ^8.1.6
  image_picker: ^1.1.2
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.2

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - .env
